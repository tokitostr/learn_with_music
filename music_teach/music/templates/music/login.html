{% extends 'music/base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<style>
    .auth-container {
        max-width: 400px;
        margin: 50px auto;
        background: white;
        border-radius: 8px;
        border: 1px solid #e5e5e5;
        overflow: hidden;
    }
    
    .auth-header {
        padding: 30px 30px 0 30px;
        text-align: center;
    }
    
    .auth-header h2 {
        margin: 0;
        color: #1a1a1a;
        font-size: 24px;
        font-weight: 500;
    }
    
    .auth-header p {
        margin: 8px 0 0;
        color: #666;
        font-size: 14px;
    }
    
    .auth-form {
        padding: 30px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #1a1a1a;
        font-weight: 500;
        font-size: 14px;
    }
    
    .form-group input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d0d0d0;
        border-radius: 4px;
        font-size: 14px;
        transition: border-color 0.2s;
        box-sizing: border-box;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #4a90d9;
    }
    
    .btn-auth {
        width: 100%;
        padding: 10px 12px;
        background-color: #4a90d9;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
    }
    
    .btn-auth:hover {
        background-color: #3a7bc8;
    }
    
    .auth-footer {
        text-align: center;
        padding-top: 20px;
        border-top: 1px solid #f0f0f0;
        margin-top: 20px;
    }
    
    .auth-footer p {
        margin: 0;
        color: #666;
        font-size: 14px;
    }
    
    .auth-footer a {
        color: #4a90d9;
        text-decoration: none;
        font-weight: 500;
    }
    
    .auth-footer a:hover {
        text-decoration: underline;
    }
    
    .error-message {
        background-color: #fee;
        border: 1px solid #fcc;
        color: #c33;
        padding: 10px;
        border-radius: 4px;
        margin-bottom: 20px;
        font-size: 14px;
    }
</style>

<div class="auth-container">
    <div class="auth-header">
        <h2>Вход</h2>
        <p>Войдите в свой аккаунт</p>
    </div>
    
    <div class="auth-form">
        {% if messages %}
            {% for message in messages %}
                <div class="error-message">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn-auth">Войти</button>
        </form>
        
        <div class="auth-footer">
            <p>Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></p>
        </div>
    </div>
</div>
{% endblock %}
